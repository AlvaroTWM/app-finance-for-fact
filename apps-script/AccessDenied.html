<!doctype html>
<html lang="es">
  <head>
    <base target="_top">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Acceso restringido</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Arial, sans-serif;
        background: linear-gradient(180deg, #f3fff7 0%, #eef6f3 100%);
        color: #0f172a;
      }

      main {
        width: min(92vw, 34rem);
        border: 1px solid rgba(6, 78, 59, 0.12);
        border-radius: 2rem;
        background: rgba(255, 255, 255, 0.9);
        padding: 2rem;
        box-shadow: 0 24px 70px rgba(15, 23, 42, 0.08);
        text-align: center;
      }

      h1 {
        margin: 0;
        font-size: 2rem;
      }

      p {
        margin: 1rem 0 0;
        line-height: 1.6;
        color: #475569;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Acceso restringido</h1>
      <p>Inicia sesion con tu cuenta corporativa y verifica que pertenezcas al grupo autorizado.</p>
    </main>
  </body>
</html>
